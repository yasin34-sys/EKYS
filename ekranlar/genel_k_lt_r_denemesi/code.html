<!-- Top Navigation (Sınav Modu - Özel) -->
<header class="bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 transition-all duration-200">

<div class="flex flex-col items-center justify-center">
<h1 class="font-title-lg text-title-lg text-on-surface">Genel Kültür Denemesi</h1>
<div class="flex items-center gap-1 text-primary">

</div>
</div>
<button aria-label="Sınavı Bitir" class="text-on-surface-variant hover:bg-surface-container-low p-2 -mr-2 rounded-full transition-colors">
<span class="material-symbols-outlined">flag</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-16 pb-[80px] overflow-y-auto px-margin-mobile md:px-margin-desktop bg-[#FAFAF8] flex justify-center">
<div class="w-full max-w-2xl flex flex-col gap-lg py-lg">

<div class="flex items-center gap-xs overflow-x-auto no-scrollbar py-1 px-2 w-full">

<button class="min-w-[32px] h-[32px] flex items-center justify-center rounded-full bg-surface-container-high text-on-surface font-label-sm text-label-sm shrink-0">2</button>
<button class="min-w-[32px] h-[32px] flex items-center justify-center rounded-full bg-surface-container-high text-on-surface font-label-sm text-label-sm shrink-0">3</button>
<button class="min-w-[32px] h-[32px] flex items-center justify-center rounded-full bg-surface-container-lowest border border-outline-variant text-on-surface-variant font-label-sm text-label-sm shrink-0">4</button>
<button class="min-w-[32px] h-[32px] flex items-center justify-center rounded-full bg-surface-container-lowest border border-outline-variant text-on-surface-variant font-label-sm text-label-sm shrink-0">5</button>

</div>

<!-- Soru Kartı -->

<!-- Kategori ve Bilgi -->
<div class="flex justify-between items-center border-b border-outline-variant pb-sm">
<span class="font-label-md text-label-md text-on-surface-variant">Soru 1 / 60</span>
<span class="font-label-sm text-label-sm bg-surface-container px-2 py-1 rounded text-on-surface">Tarih</span>
</div>
<!-- Soru Metni -->
<div class="font-body-lg text-body-lg text-on-surface leading-relaxed">
<p class="mb-4">Aşağıdakilerden hangisi, Osmanlı Devleti'nde XIX. yüzyılda eğitim alanında yapılan yeniliklerden biri <strong>değildir?</strong></p>
</div>
<!-- Şıklar -->

<!-- Sınavı Bitir Onay Modalı (Gizli - Örnek) -->
<div class="hidden fixed inset-0 z-[60] flex items-center justify-center px-margin-mobile bg-on-background/40 backdrop-blur-sm transition-opacity opacity-0" id="finish-modal">
<div class="bg-surface-container-lowest rounded-xl shadow-lg w-full max-w-sm p-lg flex flex-col gap-md transform scale-95 transition-transform">
<div class="flex items-center gap-3 text-on-surface">
<span class="material-symbols-outlined text-primary text-[32px]">flag</span>
<h3 class="font-title-lg text-title-lg">Sınavı Bitir</h3>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">
                Henüz cevaplamadığınız <strong>42</strong> soru bulunuyor. Sınavı bitirmek istediğinize emin misiniz?
            </p>
<div class="flex gap-unit justify-end mt-sm">
<button class="px-4 py-2 rounded-lg font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low" onclick="toggleModal('finish-modal', false)">Vazgeç</button>
<button class="px-4 py-2 rounded-lg font-label-md text-label-md bg-primary text-on-primary hover:bg-primary/90">Bitir</button>
</div>
</div>
</div>
<script>
        // Simple timer logic
        let timeLeft = 45 * 60; // 45 minutes in seconds
        const timerElement = document.getElementById('exam-timer');

        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 300) { // Last 5 minutes
                timerElement.parentElement.classList.remove('text-primary');
                timerElement.parentElement.classList.add('text-error');
            }

            if (timeLeft > 0) {
                timeLeft--;
            }
        }

        setInterval(updateTimer, 1000);

        // Modal toggle helper
        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modal.querySelector('div').classList.remove('scale-95');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                modal.querySelector('div').classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 200); // match transition duration
            }
        }
    </script>
