<body class="bg-background text-on-background font-sans antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-white">
<!-- Exam Top App Bar -->
<!-- Suppressing global navigation shell due to task-focused transactional intent (Exam Mode) -->
<header class="flex justify-between items-center px-margin-mobile h-16 bg-surface border-b border-outline-variant sticky top-0 z-50">
<button aria-label="Sınavdan Çık" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface truncate px-2">
            İnkılap Tarihi Denemesi
        </h1>
<!-- Timer Component -->
<div class="flex items-center gap-xs bg-surface-container py-1 px-3 rounded-full text-on-surface font-label-md text-label-md">
<span class="material-symbols-outlined text-[16px]">timer</span>
<span class="w-[42px] text-center font-mono tracking-tight" id="countdown-timer">44:59</span>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 overflow-y-auto pb-24">
<div class="max-w-3xl mx-auto w-full px-margin-mobile pt-lg">
<!-- Progress Indicator -->
<div class="mb-lg">
<div class="flex justify-between items-end mb-sm">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Soru 1</span>
<span class="font-label-sm text-label-sm text-outline">1 / 20</span>
</div>
<div class="h-1 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary w-[5%] transition-all duration-300"></div>
</div>
</div>
<!-- Question Card -->
<article class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm mb-lg">
<div class="p-md md:p-lg border-b border-outline-variant/50">
<p class="font-body-lg text-body-lg text-on-surface leading-relaxed">
                        Mondros Ateşkes Antlaşması'ndan sonra başlayan işgallere karşı Türk halkının <strong>ilk teşkilatlı tepkisi</strong> aşağıdakilerden hangisi olmuştur?
                    </p>
</div>
<!-- Options (Exam Mode: No immediate right/wrong feedback) -->
<div class="p-md md:p-lg flex flex-col gap-sm" id="options-container">
<!-- Option A -->
<button class="w-full text-left flex items-start gap-md p-md rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors group option-btn">
<div class="w-8 h-8 shrink-0 rounded-full border border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary group-hover:text-primary transition-colors option-circle">
                            A
                        </div>
<span class="font-body-md text-body-md text-on-surface mt-[5px]">Düzenli orduyu kurma çalışmalarına başlamak</span>
</button>
<!-- Option B -->
<button class="w-full text-left flex items-start gap-md p-md rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors group option-btn">
<div class="w-8 h-8 shrink-0 rounded-full border border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary group-hover:text-primary transition-colors option-circle">
                            B
                        </div>
<span class="font-body-md text-body-md text-on-surface mt-[5px]">Bölgesel direniş cemiyetleri (Müdafaa-i Hukuk) kurmak</span>
</button>
<!-- Option C -->
<button class="w-full text-left flex items-start gap-md p-md rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors group option-btn">
<div class="w-8 h-8 shrink-0 rounded-full border border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary group-hover:text-primary transition-colors option-circle">
                            C
                        </div>
<span class="font-body-md text-body-md text-on-surface mt-[5px]">Türkiye Büyük Millet Meclisi'ni açmak</span>
</button>
<!-- Option D -->
<button class="w-full text-left flex items-start gap-md p-md rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors group option-btn">
<div class="w-8 h-8 shrink-0 rounded-full border border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary group-hover:text-primary transition-colors option-circle">
                            D
                        </div>
<span class="font-body-md text-body-md text-on-surface mt-[5px]">İstanbul Hükümeti ile uzlaşma yolları aramak</span>
</button>
<!-- Option E -->
<button class="w-full text-left flex items-start gap-md p-md rounded-lg border border-outline-variant hover:bg-surface-container-low transition-colors group option-btn">
<div class="w-8 h-8 shrink-0 rounded-full border border-outline-variant flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:border-primary group-hover:text-primary transition-colors option-circle">
                            E
                        </div>
<span class="font-body-md text-body-md text-on-surface mt-[5px]">Kuvay-ı İnzibatiye birliklerine katılmak</span>
</button>
</div>
</article>
</div>
</main>
<!-- Task-Focused Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-surface/90 backdrop-blur-md border-t border-outline-variant pb-safe">
<div class="max-w-3xl mx-auto w-full h-20 px-margin-mobile flex justify-between items-center">
<!-- Previous Button (Disabled state for Q1) -->
<button class="flex items-center gap-xs px-2 py-2 text-on-surface-variant font-label-md text-label-md opacity-40 cursor-not-allowed" disabled="">
<span class="material-symbols-outlined text-[20px]">chevron_left</span>
<span>Önceki</span>
</button>
<!-- Question List Grid Icon -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-label-sm text-label-sm mt-1">Soru Listesi</span>
</button>
<!-- Next Button -->
<button class="flex items-center gap-xs px-4 py-3 bg-primary text-on-primary rounded-lg font-label-md text-label-md hover:bg-primary-container transition-colors shadow-sm">
<span>Sonraki</span>
<span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
</footer>
<!-- Interactive Logic for Exam Mode -->
<script>
        // Option Selection Logic
        const options = document.querySelectorAll('.option-btn');
        options.forEach(option => {
            option.addEventListener('click', function() {
                // Remove selected state from all
                options.forEach(opt => {
                    opt.classList.remove('border-primary', 'bg-surface-container-low');
                    opt.classList.add('border-outline-variant');
                    const circle = opt.querySelector('.option-circle');
                    circle.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                    circle.classList.add('border-outline-variant', 'text-on-surface-variant');
                });

                // Add selected state to clicked
                this.classList.remove('border-outline-variant');
                this.classList.add('border-primary', 'bg-surface-container-low');
                const activeCircle = this.querySelector('.option-circle');
                activeCircle.classList.remove('border-outline-variant', 'text-on-surface-variant');
                activeCircle.classList.add('bg-primary', 'text-on-primary', 'border-primary');
            });
        });

        // Simple Timer Logic
        let timeInSeconds = 44 * 60 + 59;
        const timerElement = document.getElementById('countdown-timer');

        setInterval(() => {
            if(timeInSeconds > 0) {
                timeInSeconds--;
                const minutes = Math.floor(timeInSeconds / 60);
                const seconds = timeInSeconds % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }, 1000);
    </script>
