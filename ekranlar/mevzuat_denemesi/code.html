<body class="bg-[#FAFAF8] text-on-background min-h-screen flex flex-col pt-16 pb-20 md:pb-0">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline flat no shadows text-primary dark:text-primary-fixed-dim font-display-lg-mobile text-display-lg-mobile">
<button class="p-2 hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-all duration-200 active:opacity-70 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h1 class="font-headline-sm text-headline-sm text-on-surface">Mevzuat Denemesi</h1>
<div class="flex items-center gap-1 text-primary-container">
<span class="material-symbols-outlined text-[16px]">timer</span>
<span class="font-label-md text-label-md font-semibold">120:00</span>
</div>
</div>
<button class="p-2 hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-all duration-200 active:opacity-70 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</button>
</header>
<main class="flex-grow flex flex-col md:max-w-2xl mx-auto w-full">
<!-- Progress Bar -->
<div class="w-full bg-surface-variant h-1">
<div class="bg-primary-container h-1 w-1/5"></div>
</div>
<div class="px-margin-mobile py-lg flex-grow flex flex-col">
<!-- Question Header -->
<div class="flex justify-between items-start mb-md">
<span class="font-label-md text-label-md text-on-surface-variant bg-surface-container-high px-2 py-1 rounded-full">Soru 1 / 50</span>
<span class="font-label-md text-label-md text-on-surface-variant">657 Sayılı DMK</span>
</div>
<!-- Question Card -->
<div class="bg-white rounded-xl border border-[#E5E7EB] p-md mb-lg shadow-sm flex-grow flex flex-col">
<p class="font-body-lg text-body-lg text-on-surface mb-lg">
                    657 sayılı Devlet Memurları Kanunu'na göre, aşağıdakilerden hangisi "Ödevler ve Sorumluluklar" kısmında yer alan konulardan biri <strong>değildir</strong>?
                </p>
<!-- Options -->
<div class="flex flex-col gap-unit">
<!-- Option A -->
<button class="w-full text-left p-md border border-[#E5E7EB] rounded-lg hover:bg-surface-container-low transition-colors flex items-start gap-md group">
<span class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center flex-shrink-0 font-label-md text-label-md group-hover:border-primary-container group-hover:text-primary-container">A</span>
<span class="font-body-md text-body-md pt-1">Sadakat</span>
</button>
<!-- Option B (Selected) -->
<button class="w-full text-left p-md border border-primary-container bg-surface-container-low rounded-lg transition-colors flex items-start gap-md">
<span class="w-8 h-8 rounded-full border border-primary-container bg-primary-container text-white flex items-center justify-center flex-shrink-0 font-label-md text-label-md">B</span>
<span class="font-body-md text-body-md pt-1">Toplu eylem ve hareketlerde bulunma yasağı</span>
</button>
<!-- Option C -->
<button class="w-full text-left p-md border border-[#E5E7EB] rounded-lg hover:bg-surface-container-low transition-colors flex items-start gap-md group">
<span class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center flex-shrink-0 font-label-md text-label-md group-hover:border-primary-container group-hover:text-primary-container">C</span>
<span class="font-body-md text-body-md pt-1">İzin hakkı</span>
</button>
<!-- Option D -->
<button class="w-full text-left p-md border border-[#E5E7EB] rounded-lg hover:bg-surface-container-low transition-colors flex items-start gap-md group">
<span class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center flex-shrink-0 font-label-md text-label-md group-hover:border-primary-container group-hover:text-primary-container">D</span>
<span class="font-body-md text-body-md pt-1">Davranış ve işbirliği</span>
</button>
<!-- Option E -->
<button class="w-full text-left p-md border border-[#E5E7EB] rounded-lg hover:bg-surface-container-low transition-colors flex items-start gap-md group">
<span class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center flex-shrink-0 font-label-md text-label-md group-hover:border-primary-container group-hover:text-primary-container">E</span>
<span class="font-body-md text-body-md pt-1">Amir durumda olan devlet memurlarının görev ve sorumlulukları</span>
</button>
</div>
</div>
</div>
<!-- Exam Controls (Bottom Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-white border-t border-[#E5E7EB] p-md flex justify-between items-center z-40 pb-safe md:static md:border-none md:bg-transparent">
<button class="px-md py-sm rounded-lg text-primary-container font-label-md text-label-md flex items-center gap-xs hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px]">chevron_left</span>
                Önceki
            </button>
<button class="px-md py-sm rounded-lg bg-surface-container-high text-on-surface font-label-md text-label-md flex items-center gap-xs hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px]">apps</span>
                Soru Listesi
            </button>
<button class="px-md py-sm rounded-lg bg-primary-container text-white font-label-md text-label-md flex items-center gap-xs hover:bg-primary transition-colors">
                Sonraki
                <span class="material-symbols-outlined text-[18px]">chevron_right</span>
</button>
</div>
